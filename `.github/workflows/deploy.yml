name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: gen-lang-client-0205637637
  SERVICE: nexus
  REGION: europe-west1
  IMAGE: gcr.io/gen-lang-client-0205637637/nexus

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: <LaTex>${{ secrets.WIF_PROVIDER }}
          service_account: $</LaTex>{{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet
      - name: Build Docker image
        run: |
          docker build \
            -t <LaTex>${{ env.IMAGE }}:$</LaTex>{{ github.sha }} \
            -t <LaTex>${{ env.IMAGE }}:latest .
      - name: Push Docker image
        run: |
          docker push $</LaTex>{{ env.IMAGE }}:<LaTex>${{ github.sha }}
          docker push $</LaTex>{{ env.IMAGE }}:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy <LaTex>${{ env.SERVICE }} \
            --image $</LaTex>{{ env.IMAGE }}:<LaTex>${{ github.sha }} \
            --region $</LaTex>{{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,PORT=8080,OPENAI_API_KEY=<LaTex>${{ secrets.OPENAI_API_KEY }},OPENAI_BASE_URL=$</LaTex>{{ secrets.OPENAI_BASE_URL }},OPENAI_API_BASE=${{ secrets.OPENAI_BASE_URL }}" \
            --quiet
